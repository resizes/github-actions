name: "Build and Push Docker Image to ECR"
description: "Build and push a Docker image to Amazon ECR using AWS OIDC role"

inputs:
  aws_region:
    description: "AWS region for ECR"
  
  aws_oidc_role:
    description: "AWS OIDC role to assume"

  ecr_repository:
    description: "ECR repository name"

  docker_platforms:
    description: "Docker platforms to build for"
    default: "linux/amd64,linux/arm64"
  
  docker_image_tag:
    description: "Tag for the Docker image"
  
  dockerfile_path:
    description: "Path to the Dockerfile"
    default: "Dockerfile"
  
  env_vars:
    description: "Environment variables to pass during the Docker build process"
    default: ""

  cache_key_prefix:
    description: "Prefix for cache key"
    default: "docker-layers"

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: configure aws credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_oidc_role }}
        aws-region: ${{ inputs.aws_region }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Create .env file
      shell: bash
      run: |
        echo "${{ inputs.env_vars }}" > .env

    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ inputs.cache_key_prefix }}-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          ${{ inputs.cache_key_prefix }}-${{ runner.os }}-

    - name: Build, tag, and push client docker image to Amazon ECR
      shell: bash
      run: |
        docker buildx create --use --name=cache-builder
        docker buildx build --push \
          --platform ${{ inputs.docker_platforms }} \
          -t ${{ inputs.ecr_repository }}:${{ inputs.docker_image_tag }} \
          --cache-from type=local,src=/tmp/.buildx-cache \
          --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
          -f ${{ inputs.dockerfile_path }} \
          .

    - name: Move cache
      shell: bash
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache