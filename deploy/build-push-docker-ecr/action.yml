name: "Build and Push Docker Image to ECR"
description: "Build and push a Docker image to Amazon ECR using AWS OIDC role"

inputs:
  aws_region:
    description: "AWS region for ECR"
  
  aws_oidc_role:
    description: "AWS OIDC role to assume"

  ecr_repository:
    description: "ECR repository name"

  docker_platforms:
    description: "Docker platforms to build for"
    default: "linux/amd64,linux/arm64"
  
  docker_image_tag:
    description: "Tag for the Docker image"
  
  dockerfile_path:
    description: "Path to the Dockerfile"
    default: "Dockerfile"
  
  env_vars:
    description: "Environment variables to pass during the Docker build process"
    default: ""

  cache_key_prefix:
    description: "Prefix for cache key"
    default: "docker-layers"
  
  secrets_input:
    description: "Comma-separated list of secret names and their env vars (format: secret_id=env_var)"
    default: ""
  
  docker_context:
    description: "Docker build context"
    default: "."

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: configure aws credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_oidc_role }}
        aws-region: ${{ inputs.aws_region }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Create .env file
      shell: bash
      run: |
        echo "${{ inputs.env_vars }}" > .env

    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ inputs.cache_key_prefix }}-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          ${{ inputs.cache_key_prefix }}-${{ runner.os }}-

    - name: Build, tag, and push client docker image to Amazon ECR
      shell: bash
      env:
        SECRETS_INPUT: ${{ inputs.secrets_input }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ inputs.ecr_repository }}
        DOCKER_IMAGE_TAG: ${{ inputs.docker_image_tag }}
      run: |
        # Build the secrets arguments
        SECRETS_ARGS=""
        if [ -n "$SECRETS_INPUT" ]; then
          IFS=',' read -ra SECRETS <<< "$SECRETS_INPUT"
          for secret_pair in "${SECRETS[@]}"; do
            secret_pair=$(echo "$secret_pair" | xargs)  # Trim whitespace
            # Split by = to get secret_id and env_var
            IFS='=' read -r secret_id env_var <<< "$secret_pair"
            if [ -n "$secret_id" ] && [ -n "$env_var" ]; then
              SECRETS_ARGS="$SECRETS_ARGS --secret id=$secret_id,env=$env_var"
            fi
          done
        fi

        docker buildx build --push \
          --platform ${{ inputs.docker_platforms }} \
          -t ${{ inputs.ecr_repository }}:${{ inputs.docker_image_tag }} \
          $SECRETS_ARGS \
          --cache-from type=local,src=/tmp/.buildx-cache \
          --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
          -f ${{ inputs.dockerfile_path }} \
          ${{ inputs.docker_context }}

    - name: Move cache
      shell: bash
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache